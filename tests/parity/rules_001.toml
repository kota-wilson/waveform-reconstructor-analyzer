[package]
name = "m8-008-parity-rule"
version = "1.0.0"
schema_version = "0.1.0"
description = "Software validation fixture for desktop-vs-embedded rule parity."

[target]
kind = "controller_runtime"
identifier = "parity-test-runtime"
notes = [
  "Software validation only; not hardware qualification or certification evidence.",
]

[sample_timing]
timestamp_unit = "s"
nominal_sample_rate_hz = 1000.0
sample_rate_tolerance_hz = 0.0
nominal_sample_interval_s = 0.001
timestamp_tolerance_s = 0.0

[[channels]]
name = "switch_signal"
unit = "V"
sample_rate_hz = 1000.0

[[channels.thresholds]]
name = "switch_decision"
role = "decision"
value = { value = 2.5, unit = "V" }

[[criteria]]
id = "CRIT-001"
channel = "switch_signal"

[criteria.measurement]
type = "transient_event_duration"
event_kind = "dropout"
expected_state = "high"
threshold = { value = 2.5, unit = "V" }

[criteria.requirement]
operator = "less_than_or_equal"
value = { value = 0.001, unit = "s" }

[[criteria]]
id = "CRIT-002"
channel = "switch_signal"

[criteria.measurement]
type = "state_transition_count"
threshold = { value = 2.5, unit = "V" }

[criteria.requirement]
operator = "equal_to"
value = { value = 2.0, unit = "count" }
