[input]
time_column = "time_s"
channels = ["control_v"]
time_unit = "s"
signal_unit = "V"

[[criteria]]
id = "dsl_inverted_edge_thresholds"
channel = "control_v"

[criteria.measurement]
type = "rise_time"
low_threshold = { value = 4.5, unit = "V" }
high_threshold = { value = 0.5, unit = "V" }

[criteria.requirement]
operator = "less_than_or_equal"
value = 0.005
unit = "s"
