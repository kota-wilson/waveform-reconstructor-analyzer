[input]
time_column = "time_s"
channels = ["supply_v", "control_v", "output_v"]
time_unit = "s"
signal_unit = "V"

[[criteria]]
id = "supply_dropout_glitch"
type = "glitch_detection"
channel = "supply_v"
expected_state = "high"
threshold_v = 2.5
max_duration_s = 0.0005

[[criteria]]
id = "control_transition_count"
type = "state_transitions"
channel = "control_v"
threshold_v = 2.5
expected_count = 2

[[criteria]]
id = "output_high_width"
type = "pulse_width"
channel = "output_v"
state = "high"
threshold_v = 2.5
min_width_s = 0.002
