# Example measurement-backed DSL config for `ferrisoxide-signal analyze --config`.
# This is equivalent to `examples/basic-config.toml` for this input.

[input]
time_column = "time"
channels = ["input_v", "output_v"]
time_unit = "s"
signal_unit = "V"

[[filters]]
type = "moving_average"
window_samples = 2

[[criteria]]
id = "input_min_voltage"
channel = "input_v"

[criteria.measurement]
type = "minimum_sample"

[criteria.requirement]
operator = "greater_than_or_equal"
value = 0.0
unit = "V"

[[criteria]]
id = "input_max_voltage"
channel = "input_v"

[criteria.measurement]
type = "maximum_sample"

[criteria.requirement]
operator = "less_than_or_equal"
value = 5.5
unit = "V"
