[workspace]
members = [
    "crates/wra-core",
    "crates/wra-cli",
    "crates/wra-embedded",
    "crates/wra-plot",
    "crates/wra-signal",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/kota-wilson/waveform-reconstructor-analyzer"
rust-version = "1.76"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.dependencies]
csv = "1"
plotters = { version = "0.3.7", default-features = false, features = ["svg_backend", "line_series"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
